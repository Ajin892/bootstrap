<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Layout</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container">
    <div class="row">
        <div class="col-12 col-md-4">
            <img src="https://images.unsplash.com/photo-1529665253569-6d01c0eaf7b6?q=80&w=1085&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Profile Image" style="width:200px ; height: auto; border-radius: 50%;">
        </div>
        <div class="col-12 col-md-8">
            <h2>John Doe</h2>
            <p>
                Hello! I am a web development student. I enjoy learning HTML,
                CSS, Bootstrap, and JavaScript to build responsive websites.
            </p>
        </div>

    </div>
</div>

</body>
</html>
